name: Trigger auto deployment for terrafy-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/terrafy-api-AutoDeployTrigger-e412ba8c-90aa-466e-bb9f-e51e1d707ef1.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TERRAFYAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TERRAFYAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TERRAFYAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.TERRAFYAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.TERRAFYAPI_REGISTRY_PASSWORD }}
          containerAppName: terrafy-api
          resourceGroup: terrafy-prod-sv
          imageToBuild: ghcr.io/terrafy-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


