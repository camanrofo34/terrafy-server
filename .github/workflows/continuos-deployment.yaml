name: ci-cd-azure-container-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  REGISTRY_LOGIN_SERVER: ${{ vars.REGISTRY_LOGIN_SERVER }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
  AZURE_CONTAINER_NAME: ${{ vars.AZURE_CONTAINER_NAME }}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail

          required_vars=(
            REGISTRY_LOGIN_SERVER
            IMAGE_NAME
            AZURE_RESOURCE_GROUP
            AZURE_CONTAINER_APP_NAME
          )

          required_secrets=(
            REGISTRY_USERNAME
            REGISTRY_PASSWORD
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
          )

          for key in "${required_vars[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing repository variable: $key"
              exit 1
            fi
          done

          for key in "${required_secrets[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing repository secret: $key"
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container App
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail

            IMAGE="${REGISTRY_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}"

            az config set extension.use_dynamic_install=yes_without_prompt

            if [ -n "${AZURE_CONTAINER_NAME:-}" ]; then
              az containerapp update \
                --name "${AZURE_CONTAINER_APP_NAME}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --container-name "${AZURE_CONTAINER_NAME}" \
                --image "${IMAGE}"
            else
              az containerapp update \
                --name "${AZURE_CONTAINER_APP_NAME}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --image "${IMAGE}"
            fi

      - name: Show deployed image
        run: echo "Deployed image ${REGISTRY_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}"